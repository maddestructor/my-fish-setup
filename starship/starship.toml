format = """
$directory$custom.dir_end$git_branch$git_status$nodejs$python$rust$golang$fill$cmd_duration[](fg:#3d59a1)[ $time ](bg:#3d59a1 fg:#c0caf5)\n$character"""

add_newline = false

[fill]
symbol = "·"
style = "dimmed white"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bg:#3d59a1 fg:#c0caf5 bold"
format = "[ $path ]($style)"

# Closing arrow for dir — only shows when NOT in a git repo
# When in git, git_branch handles the transition arrow instead
[custom.dir_end]
command = "echo -n"
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["bash", "-c"]
format = "[](fg:#3d59a1)"

[git_branch]
symbol = " "
style = "bg:#7aa2f7 fg:#1a1b26"
format = "[](fg:#3d59a1 bg:#7aa2f7)[ $symbol$branch ]($style)"

[git_status]
style = "bg:#7aa2f7 fg:#ff9e64"
format = "[$all_status$ahead_behind]($style)[](fg:#7aa2f7)"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"
conflicted = "~${count}"

[cmd_duration]
min_time = 500
format = "[ took $duration ]($style)"
style = "bold yellow"

[time]
disabled = false
format = "[ $time ]($style)"
time_format = "%H:%M:%S"
style = "bg:#3d59a1 fg:#c0caf5"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[nodejs]
symbol = " "
style = "bold green"
format = "[ $symbol$version ]($style)"

[python]
symbol = " "
style = "bold yellow"
format = "[ $symbol$version ]($style)"

[rust]
symbol = " "
style = "bold red"
format = "[ $symbol$version ]($style)"

[golang]
symbol = " "
style = "bold cyan"
format = "[ $symbol$version ]($style)"
