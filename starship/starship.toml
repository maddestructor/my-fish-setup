format = """
[ $directory ](bg:#3b4261 fg:#c0caf5 bold)$git_branch$git_status$nodejs$python$rust$golang$fill$cmd_duration[](fg:#3b4261)[ $time ](bg:#3b4261 fg:#c0caf5)\n$character"""

add_newline = false

[fill]
symbol = "·"
style = "dimmed white"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bg:#3b4261 fg:#c0caf5 bold"
format = "[ $path ]($style)[](fg:#3b4261)"

[git_branch]
symbol = " "
style = "bg:#394b70 fg:#89ddff"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bg:#394b70 fg:#f7768e"
format = "[$all_status$ahead_behind]($style)[](fg:#394b70)"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"
conflicted = "~${count}"

[cmd_duration]
min_time = 500
format = "[ took $duration ]($style)"
style = "bold yellow"

[time]
disabled = false
format = "[ $time ]($style)"
time_format = "%H:%M:%S"
style = "bg:#3b4261 fg:#c0caf5"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[nodejs]
symbol = " "
style = "bold green"
format = "[ $symbol$version ]($style)"

[python]
symbol = " "
style = "bold yellow"
format = "[ $symbol$version ]($style)"

[rust]
symbol = " "
style = "bold red"
format = "[ $symbol$version ]($style)"

[golang]
symbol = " "
style = "bold cyan"
format = "[ $symbol$version ]($style)"
